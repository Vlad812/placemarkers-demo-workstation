services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: cs-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: my_rabbit
      RABBITMQ_DEFAULT_PASS: rabbit
      RABBITMQ_DEFAULT_VHOST: placemarkers
    volumes:
      - placemarkers_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running && rabbitmq-diagnostics -q check_port_connectivity"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 30s
    networks:
      - place_markers_net

volumes:
  placemarkers_rabbitmq_data:

networks:
  place_markers_net:
    external: true
